kind = "web"
previewPath = "/"
title = "Kelas Menengah di Persimpangan"
version = "1.0.0"
id = "artifacts/kelas-menengah"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18292

[services.development]
run = "pnpm --filter @workspace/kelas-menengah run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kelas-menengah", "run", "build" ]
publicDir = "artifacts/kelas-menengah/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18292"
BASE_PATH = "/"
